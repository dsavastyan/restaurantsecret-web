<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Страница не найдена — RestaurantSecret</title>
    <script>
      // SPA-fallback: сохраняем путь и возвращаемся на корень,
      // где React-роутер покажет компонент NotFound.
      sessionStorage.setItem('redirectPath', window.location.pathname + window.location.search)
      window.location.replace('/')
    </script>
  </head>
  <body></body>
</html>
